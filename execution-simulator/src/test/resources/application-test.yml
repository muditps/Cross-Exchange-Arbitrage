# ============================================================
# Execution Simulator — Test Configuration
# ============================================================
spring:
  kafka:
    bootstrap-servers: ${spring.embedded.kafka.brokers:localhost:29092}
    consumer:
      group-id: execution-simulator-test-group
      auto-offset-reset: earliest
    listener:
      # Prevents listener containers from failing on startup when a topic (e.g. normalised-ticks)
      # is not pre-created in the embedded Kafka broker used by context-load tests.
      missing-topics-fatal: false

  # Disable JPA auto-configuration in unit tests that don't need TimescaleDB.
  # Integration tests (Session 4.5) use @DataJpaTest with Testcontainers instead.
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration
      - org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration
      - org.springframework.boot.autoconfigure.flyway.FlywayAutoConfiguration

arbitrage:
  simulation:
    default-slippage-bps: 2.00
    historical-window-seconds: 60
    detection-to-decision-ms: 5
    enabled: false
